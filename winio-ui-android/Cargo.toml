[package]
name = "winio-ui-android"
version = "0.1.0"
description = "Android backend for winio."
edition = { workspace = true }
readme = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[dependencies]

[target.'cfg(target_os = "android")'.dependencies]
image = { workspace = true, default-features = false }
jni = { workspace = true }
futures-util = "0.3.31"
libc = "1.0.0-alpha.1"
log = "0.4"

oneshot = { version = "0.2.1", features = ["std"] }

winio-primitive = { workspace = true }
winio-callback = { workspace = true }
winio-handle = { workspace = true }
winio-pollable = { workspace = true }

compio = { workspace = true }

inherit-methods-macro = { workspace = true }

scoped-tls = { workspace = true }

[build-dependencies]
encoding_rs = "0.8.35"

[features]
compio-compat = ["compio/compat-futures"]
